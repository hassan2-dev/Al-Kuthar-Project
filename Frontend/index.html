<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/al-kawthar-logo.png" />
    <link rel="apple-touch-icon" href="/al-kawthar-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الكوثر - نظام إدارة العقارات</title>

    <!-- Open Graph / Social sharing (URLs injected at build/dev by vite.config.js) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__OG_SITE_URL__/" />
    <meta property="og:title" content="الكوثر - نظام إدارة العقارات" />
    <meta property="og:description" content="نظام الكوثر لإدارة العقارات والاستشارات العقارية" />
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="الكوثر للعقارات والاستشارات العقارية" />
    <meta property="og:site_name" content="الكوثر للعقارات" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="الكوثر - نظام إدارة العقارات" />
    <meta name="twitter:description" content="نظام الكوثر لإدارة العقارات والاستشارات العقارية" />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ak-theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
